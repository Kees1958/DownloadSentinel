name: Build and Publish Chrome Extension
on:
  push:
    tags:
      - "v*"
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update manifest version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting manifest version to $VERSION"
          jq --arg v "$VERSION" '.version = $v' extension/manifest.json > extension/manifest_tmp.json
          mv extension/manifest_tmp.json extension/manifest.json

      - name: Create clean Chrome ZIP
        run: |
          cd extension
          zip -r "../DownloadSentinel-${GITHUB_REF_NAME}.zip" .

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-zip
          path: DownloadSentinel-*.zip

      - name: Create GitHub Release with ZIP
        uses: softprops/action-gh-release@v2
        with:
          files: DownloadSentinel-*.zip

      - name: Publish to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: DownloadSentinel-${{ github.ref_name }}.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true
