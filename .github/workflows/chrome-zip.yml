name: Build Chrome Extension ZIP
on:
  push:
    tags:
      - "v*"
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # nodig om een release aan te maken
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create clean Chrome ZIP
        run: |
          mkdir build
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.md' \
            --exclude='LICENSE' \
            . build/
          cd build
          zip -r "../DownloadSentinel-${GITHUB_REF_NAME}.zip" .

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-zip
          path: DownloadSentinel-*.zip

      - name: Create GitHub Release with ZIP
        uses: softprops/action-gh-release@v2
        with:
          files: DownloadSentinel-*.zip
