<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Download Sentinel</title>
    <link rel="stylesheet" href="PopupPage.css">
    <script src="../../util/Storage.js" type="text/javascript"></script>
    <script src="../../util/Settings.js" type="text/javascript"></script>
    <script src="PopupPage.js" type="text/javascript"></script>
</head>

<body id="background">

<div id="banner" class="banner">
    <img id="logo" class="logo" src="../../assets/icons/icon128.png" alt="Sentinel Logo">
    <span class="banner-text">Download Sentinel</span>
</div>

<section class="content">

    <div class="switch-row">
        <div class="switch-group">
            <span id="extSwitch" class="switch"></span>
            <span id="extStatus" class="status-label"></span>
        </div>
    </div>

    <div class="switch-row">
        <div class="switch-group">
            <span id="vtSwitch" class="switch off"></span>
            <span id="vtStatus" class="status-label vt-label"></span>
        </div>
    </div>

    <button id="optionsBtn" class="options-btn">OPTIONS</button>

</section>

</body>
</html>
